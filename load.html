<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tonnel - Full App</title>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; font-family: 'Inter', sans-serif; color: white; overflow: hidden; }

        /* ЭКРАН ЗАГРУЗКИ */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .glow-box { position: relative; width: 150px; height: 150px; display: flex; align-items: center; justify-content: center; margin-bottom: 30px; }
        .glow-effect {
            position: absolute; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,152,234,0.4) 0%, rgba(0,0,0,0) 70%);
            filter: blur(20px); animation: pulse 2s infinite alternate;
        }
        .glav-img { width: 100px; position: relative; z-index: 2; border-radius: 20px; }
        @keyframes pulse { from { transform: scale(1); opacity: 0.6; } to { transform: scale(1.2); opacity: 1; } }

        .progress-container { width: 70%; height: 4px; background: #1c232d; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: #0098ea; animation: loadProgress 2.5s forwards; }
        @keyframes loadProgress { to { width: 100%; } }
        .splash-footer { font-size: 14px; font-weight: 700; color: #fff; }

        /* ОСНОВНОЙ КОНТЕНТ */
        #main-wrapper { display: none; height: 100%; overflow-y: auto; }

        /* ШАПКА */
        .top-nav {
            width: 100%; background: #12181f; padding: 10px 15px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .nav-left { display: flex; align-items: center; gap: 10px; }
        .balance-box { background: #1c232d; padding: 6px 12px; border-radius: 10px; display: flex; align-items: center; gap: 6px; }
        .btn-math { width: 32px; height: 32px; background: #0098ea; border: none; border-radius: 8px; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }

        /* КНОПКИ КУПИТЬ / ПРОДАТЬ */
        .trade-tabs { display: flex; gap: 10px; padding: 10px 15px; background: #000; }
        .trade-btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; 
            font-weight: 700; color: white; cursor: pointer; font-size: 15px;
            transition: transform 0.1s;
        }
        .trade-btn:active { transform: scale(0.95); }

        /* МОДАЛЬНОЕ ОКНО ВЫБОРА */
        #trade-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 10000; justify-content: center; align-items: center;
        }
        .modal-card { background: #1c232d; width: 85%; border-radius: 20px; padding: 25px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .modal-card h3 { margin-bottom: 20px; font-size: 20px; }
        .curr-option { 
            background: #12181f; padding: 15px; border-radius: 12px; margin-bottom: 10px; 
            display: flex; justify-content: space-between; border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
        }

        /* СТРАНИЦЫ */
        .page { display: none; padding-bottom: 100px; }
        .page-active { display: block; }
        .nft-stream { width: 100%; display: flex; flex-direction: column; }

        /* ИНВЕНТАРЬ */
        .inv-page { padding: 15px; }
        .inv-header { display: flex; gap: 20px; font-size: 22px; font-weight: 700; margin-bottom: 20px; color: #515966; }
        .inv-header .active { color: white; }
        .empty-state { text-align: center; margin-top: 50px; }

        /* МЕНЮ */
        .bottom-menu {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: #0d1218; border-top: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; padding: 15px 0 35px 0; z-index: 1000;
        }
        .menu-item { text-decoration: none; color: white; font-size: 12px; font-weight: 600; opacity: 0.5; cursor: pointer; }
        .menu-item.active { opacity: 1; color: #0098ea; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="glow-box">
            <div class="glow-effect"></div>
            <img src="https://i.postimg.cc/fyFHpNWG/Glav.png" class="glav-img">
        </div>
        <div class="progress-container"><div class="progress-bar"></div></div>
        <div class="splash-footer">Tonnel Market®</div>
    </div>

    <div id="trade-modal" onclick="closeTrade()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <h3 id="modal-title">Действие</h3>
            <div class="curr-option" onclick="alert('Выбран RUB')"><span>RUB [₽]</span><span>₽</span></div>
            <div class="curr-option" onclick="alert('Выбран USDT')"><span>USDT [Tether]</span><span>$</span></div>
            <div class="curr-option" onclick="alert('Выбран TON')"><span>TON</span><span></span></div>
            <button onclick="closeTrade()" style="background:none; border:none; color:#515966; margin-top:15px; cursor:pointer;">Отмена</button>
        </div>
    </div>

    <div id="main-wrapper">
        <div class="top-nav">
            <div class="nav-left">
                <div class="balance-box">
                    <img src="https://i.postimg.cc/9MRh4wtK/lv-0-20260310221226.png" style="width:18px;">
                    <span>0</span>
                </div>
                <button class="btn-math" onclick="alert('Пополнение')">+</button>
                <button class="btn-math" onclick="alert('Вывод')">−</button>
            </div>
            <div id="ton-connect-header"></div>
        </div>

        <div class="trade-tabs">
            <button class="trade-btn" style="background:#28a745;" onclick="openTrade('Купить')">Купить</button>
            <button class="trade-btn" style="background:#dc3545;" onclick="openTrade('Продать')">Продать</button>
        </div>

        <div id="market-page" class="page page-active">
            <div class="nft-stream">
                <img src="https://i.postimg.cc/JhhfHH5C/Screenshot_20260310_221830_Telega.jpg" style="width:100%;">
                <img src="https://i.postimg.cc/FKKMkkV4/Screenshot_20260310_221835_Telega.jpg" style="width:100%;">
            </div>
        </div>

        <div id="inventory-page" class="page inv-page">
            <div class="inv-header">
                <span class="active">Гифты</span> <span>Офферы</span> <span>История</span>
            </div>
            <div class="empty-state">
                <img src="https://i.postimg.cc/K8tp7mhw/Nig.png" style="width:120px; margin-bottom:20px;">
                <p style="font-size:18px; font-weight:700;">Если подарков нет</p>
                <p style="color:#515966; font-size:14px;">Купите их на маркетплейсе</p>
                <div style="margin-top:20px; font-size:14px;">
                    Want to sell your Gift? Transfer it<br>
                    <a href="https://t.me/GiftRelayerTonnel" style="color:#0098ea; text-decoration:none; font-weight:700;">@GiftRelayerTonnel</a>
                </div>
            </div>
        </div>

        <div class="bottom-menu">
            <div class="menu-item" id="nav-inv" onclick="show('inventory')">My Gift</div>
            <div class="menu-item">Auction</div>
            <div class="menu-item">Lease</div>
            <div class="menu-item active" id="nav-mkt" onclick="show('market')">Market</div>
        </div>
    </div>

    <script>
        // Инициализация TonConnect
        const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
            manifestUrl: 'https://raw.githubusercontent.com/ton-connect/demo-dapp-with-react-ui/main/public/tonconnect-manifest.json',
            buttonRootId: 'ton-connect-header'
        });

        // Логика Купить/Продать
        function openTrade(actionType) {
            document.getElementById('modal-title').innerText = actionType + ' за валюту:';
            document.getElementById('trade-modal').style.display = 'flex';
        }

        function closeTrade() {
            document.getElementById('trade-modal').style.display = 'none';
        }

        // Переключение вкладок меню
        function show(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            
            document.getElementById(pageId + '-page').classList.add('page-active');
            document.getElementById('nav-' + (pageId === 'market' ? 'mkt' : 'inv')).classList.add('active');
        }

        // Загрузочный экран
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('main-wrapper').style.display = 'block';
                }, 500);
            }, 2500);
        };
    </script>
</body>
</html>
